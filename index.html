<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>서현빌딩 주차관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f5;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;}
input::placeholder{color:#bbb;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px;}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,0,0,0.1)}50%{box-shadow:0 0 0 8px rgba(0,0,0,0.04)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.hdr{background:#fff;border-bottom:1px solid #e8e8e8;padding:10px 14px;}
.hdr-row{display:flex;align-items:center;width:100%;}
.hdr-logo{flex:0 0 30px;width:30px;height:30px;background:#111;color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;}
.hdr-title{flex:1 1 0;min-width:0;overflow:hidden;padding:0 8px;}
.hdr-title h1{font-size:16px;font-weight:800;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-title p{font-size:9px;color:#ccc;}
.hdr-btns{flex:0 0 auto;display:flex;align-items:center;gap:6px;}
.btn-reg{flex:0 0 auto;display:flex;align-items:center;gap:4px;background:#111;color:#fff;border:none;border-radius:7px;padding:8px 12px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;white-space:nowrap;}
.btn-reg .cnt{background:#fff;color:#111;border-radius:10px;padding:0 6px;font-size:11px;font-weight:900;}
.btn-warn{flex:0 0 auto;background:#fff5f5;border:1.5px solid #fc8181;border-radius:7px;padding:4px 8px;cursor:pointer;text-align:center;}
.btn-warn .n{color:#e53e3e;font-size:11px;font-weight:900;white-space:nowrap;}
.btn-warn .l{color:#e53e3e;font-size:9px;font-weight:700;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ── Supabase 설정 ──────────────────────────────────
const SUPABASE_URL="https://hcnbjzmdupxucaectoii.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjbmJqem1kdXB4dWNhZWN0b2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MzM4ODksImV4cCI6MjA5MzEwOTg4OX0.JtTBB5Cj6HTN565aeTXnNRcXgF0cgwQI0sc-GnIf1mA";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const STATUS_INFO={
  미확인:  {icon:"🔴",label:"미확인",      color:"#e53e3e",bg:"#fff5f5",border:"#fed7d7"},
  불법주차:{icon:"🚫",label:"불법주차 확정",color:"#c53030",bg:"#fff5f5",border:"#fc8181"},
  방문객:  {icon:"🟡",label:"방문객",       color:"#b7791f",bg:"#fffff0",border:"#f6e05e"},
  교회성도:{icon:"⛪",label:"교회성도",     color:"#2b6cb0",bg:"#ebf8ff",border:"#90cdf4"},
};

const fmt=(iso)=>new Date(iso).toLocaleString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"short",hour:"2-digit",minute:"2-digit"});

function CarTypeEditor({item,onRemove,onSave,plateBadge}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(item.car_type||"");
  return(
    <div style={{background:"#f9f9f9",border:"1px solid #e8e8e8",borderRadius:8,padding:"9px 12px"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1}}>
          <div style={plateBadge}>{item.plate}</div>
          {!editing&&(
            <div style={{marginTop:4,fontSize:12,color:"#888",display:"flex",alignItems:"center",gap:6}}>
              {item.car_type
                ? <span>🚗 {item.car_type}</span>
                : <span style={{color:"#ccc"}}>차종 미입력</span>
              }
              <button onClick={()=>setEditing(true)} style={{background:"none",border:"1px solid #ddd",color:"#888",borderRadius:4,padding:"1px 7px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>수정</button>
            </div>
          )}
          {editing&&(
            <div style={{display:"flex",gap:6,marginTop:6}}>
              <input value={val} onChange={e=>setVal(e.target.value)}
                placeholder="차종 입력 (예: 소나타, SUV)"
                autoFocus
                style={{flex:1,padding:"5px 10px",border:"1.5px solid #111",borderRadius:6,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
              <button onClick={()=>{onSave(val);setEditing(false);}} style={{padding:"5px 10px",background:"#111",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:700}}>저장</button>
              <button onClick={()=>{setVal(item.car_type||"");setEditing(false);}} style={{padding:"5px 8px",background:"none",border:"1px solid #ddd",color:"#888",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>취소</button>
            </div>
          )}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
          <div style={{fontSize:12,color:"#38a169",fontWeight:600}}>✓ 등록됨</div>
          <button onClick={onRemove} style={{background:"none",border:"1px solid #fed7d7",color:"#e53e3e",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>삭제</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [plateInput,setPlateInput]=useState("");
  const [regList,setRegList]=useState([]);
  const [log,setLog]=useState([]);
  const [unreg,setUnreg]=useState([]);
  const [result,setResult]=useState(null);
  const [tab,setTab]=useState("check");
  const [addPlate,setAddPlate]=useState("");
  const [addCarType,setAddCarType]=useState("");
  const [classifyCarType,setClassifyCarType]=useState("");
  const [flash,setFlash]=useState(null);
  const [classifyTarget,setClassifyTarget]=useState(null);
  const [regOpen,setRegOpen]=useState(false);
  const [logFilter,setLogFilter]=useState("전체");
  const [unregFilter,setUnregFilter]=useState("전체");
  const [plateReady,setPlateReady]=useState(false);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const resultRef=useRef(null);
  const inputRef=useRef(null);
  const justChecked=useRef(false);

  // ── 데이터 로드 ──────────────────────────────────
  const loadAll=async()=>{
    setLoading(true);
    try{
      const [r1,r2,r3]=await Promise.all([
        sb.from("registered_vehicles").select("plate,car_type").order("created_at",{ascending:false}),
        sb.from("entry_log").select("*").order("created_at",{ascending:false}).limit(500),
        sb.from("unregistered_log").select("*").order("count",{ascending:false}),
      ]);
      if(r1.data)setRegList(r1.data);
      if(r2.data)setLog(r2.data.map(e=>({...e,time_str:e.time_str||fmt(e.created_at)})));
      if(r3.data)setUnreg(r3.data);
    }catch(e){setFlash({type:"err",msg:"데이터 로드 실패: "+e.message});}
    setLoading(false);
  };

  useEffect(()=>{loadAll();},[]);

  const clean=(v)=>v.replace(/\s/g,"");
  const isValid=(v)=>clean(v).length>=4;

  useEffect(()=>{
    setPlateReady(isValid(plateInput));
    if(justChecked.current){justChecked.current=false;return;}
    setResult(null);
  },[plateInput]);

  // ── 분류 ──────────────────────────────────────────
  const classify=async(status)=>{
    if(!classifyTarget)return;
    const {plate}=classifyTarget;
    setSaving(true);
    try{
      const upd={status};
      if(classifyCarType) upd.car_type=classifyCarType;
      await sb.from("entry_log").update(upd).eq("plate",plate).eq("registered",false);
      await sb.from("unregistered_log").update(upd).eq("plate",plate);
      setLog(prev=>prev.map(e=>e.plate===plate&&!e.registered?{...e,...upd}:e));
      setUnreg(prev=>prev.map(u=>u.plate===plate?{...u,...upd}:u));
      const s=STATUS_INFO[status];
      setFlash({type:"ok",msg:`${s.icon} ${plate} → ${s.label} 분류 완료`});
    }catch(e){setFlash({type:"err",msg:"분류 실패: "+e.message});}
    setSaving(false);
    setClassifyTarget(null);
    setClassifyCarType("");
  };

  // ── 조회 ──────────────────────────────────────────
  const doCheck=async()=>{
    const plate=clean(plateInput);
    if(!isValid(plate))return;
    const ts=new Date().toISOString();
    const time_str=fmt(ts);
    const registered=regList.some(r=>r.plate===plate);
    setSaving(true);
    try{
      // 출입 기록 저장
      await sb.from("entry_log").insert({plate,time_str,ts,registered,status:registered?null:"미확인"});

      // 미등록이면 누적
      if(!registered){
        const{data:ex}=await sb.from("unregistered_log").select("*").eq("plate",plate).single();
        if(ex){
          const newTimes=[time_str,...(ex.times||[])];
          await sb.from("unregistered_log").update({count:ex.count+1,times:newTimes,updated_at:ts}).eq("plate",plate);
        }else{
          await sb.from("unregistered_log").insert({plate,count:1,status:"미확인",times:[time_str]});
        }
      }
      setResult({plate,isRegistered:registered,time:time_str});
      justChecked.current=true;
      setPlateInput("");
      setPlateReady(false);
      await loadAll();
      setTimeout(()=>resultRef.current?.scrollIntoView({behavior:"smooth"}),100);
    }catch(e){setFlash({type:"err",msg:"저장 실패: "+e.message});}
    setSaving(false);
  };

  // ── 차량 등록 ──────────────────────────────────────
  const addReg=async()=>{
    const p=clean(addPlate);
    if(!p)return;
    if(regList.some(r=>r.plate===p)){setFlash({type:"warn",msg:"이미 등록된 차량입니다."});return;}
    setSaving(true);
    try{
      const {data,error}=await sb.from("registered_vehicles").insert({plate:p,car_type:addCarType||null}).select();
      if(error)throw error;
      await sb.from("unregistered_log").delete().eq("plate",p);
      setAddPlate(""); setAddCarType("");
      setFlash({type:"ok",msg:`${p} 등록 완료`});
      await loadAll();
    }catch(e){
      console.error("등록 오류:",e);
      setFlash({type:"err",msg:`등록 실패: ${e.message||e.code||JSON.stringify(e)}`});
    }
    setSaving(false);
  };

  const removeReg=async(plate)=>{
    if(!confirm(`${plate} 를 등록 차량에서 삭제하시겠습니까?`))return;
    setSaving(true);
    try{
      await sb.from("registered_vehicles").delete().eq("plate",plate);
      setFlash({type:"ok",msg:`${plate} 삭제 완료`});
      await loadAll();
    }catch(e){setFlash({type:"err",msg:"삭제 실패: "+e.message});}
    setSaving(false);
  };

  const updateCarType=async(plate,carType)=>{
    setSaving(true);
    try{
      await sb.from("registered_vehicles").update({car_type:carType||null}).eq("plate",plate);
      setRegList(prev=>prev.map(r=>r.plate===plate?{...r,car_type:carType||null}:r));
      setFlash({type:"ok",msg:`${plate} 차종 저장 완료`});
    }catch(e){setFlash({type:"err",msg:"저장 실패: "+e.message});}
    setSaving(false);
  };

  // ── 3개월 이전 삭제 ────────────────────────────────
  const clearOld=async()=>{
    const ago=new Date();ago.setMonth(ago.getMonth()-3);
    const old=log.filter(e=>new Date(e.ts||e.created_at)<ago);
    if(old.length===0){alert("3개월 이전 기록이 없습니다.");return;}
    if(!confirm(`3개월 이전 기록 ${old.length}건을 삭제하시겠습니까?\n삭제된 기록은 복구할 수 없습니다.`))return;
    if(!confirm(`정말 삭제하시겠습니까?\n${ago.toLocaleDateString("ko-KR")} 이전 기록 ${old.length}건이 영구 삭제됩니다.`))return;
    setSaving(true);
    try{
      await sb.from("entry_log").delete().lt("ts",ago.toISOString());
      setFlash({type:"ok",msg:`🗑 ${old.length}건 삭제 완료`});
      await loadAll();
    }catch(e){setFlash({type:"err",msg:"삭제 실패: "+e.message});}
    setSaving(false);
  };

  useEffect(()=>{
    if(!flash)return;
    const t=setTimeout(()=>setFlash(null),3000);
    return()=>clearTimeout(t);
  },[flash]);

  const unregCount=(plate)=>unreg.find(u=>u.plate===plate)?.count||0;
  const unconfirmed=unreg.filter(u=>u.status==="미확인").length;

  // ── 필터 ──────────────────────────────────────────
  const filteredLog=log.filter(e=>{
    if(logFilter==="전체")return true;
    const n=new Date(),dd=new Date(e.ts||e.created_at);
    if(logFilter==="오늘")return dd.toDateString()===n.toDateString();
    if(logFilter==="이번주"){const s=new Date(n);s.setDate(n.getDate()-n.getDay());s.setHours(0,0,0,0);return dd>=s;}
    if(logFilter==="이번달")return dd.getMonth()===n.getMonth()&&dd.getFullYear()===n.getFullYear();
    return true;
  });
  const filteredUnreg=[...unreg].filter(u=>unregFilter==="전체"||(u.status||"미확인")===unregFilter).sort((a,b)=>b.count-a.count);

  const card=(ex={})=>({background:"#fff",borderRadius:12,border:"1px solid #e8e8e8",padding:"14px 16px",...ex});
  const plateBadge={display:"inline-block",background:"#111",color:"#fff",borderRadius:6,padding:"3px 10px",fontWeight:900,fontSize:14,letterSpacing:2};

  return(
    <div style={{minHeight:"100vh",background:"#f5f5f5",color:"#111"}}>

      {/* 로딩 오버레이 */}
      {(loading||saving)&&(
        <div style={{position:"fixed",inset:0,background:"rgba(255,255,255,0.7)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
          <div style={{width:40,height:40,border:"4px solid #e8e8e8",borderTop:"4px solid #111",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          <div style={{fontSize:13,color:"#666",fontWeight:600}}>{loading?"데이터 로딩 중...":"저장 중..."}</div>
        </div>
      )}

      {/* 분류 모달 */}
      {classifyTarget&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:380,boxShadow:"0 20px 60px rgba(0,0,0,0.2)",animation:"slideIn 0.2s ease"}}>
            <div style={{fontSize:12,color:"#999",marginBottom:6}}>차량 분류</div>
            <div style={{background:"#111",color:"#fff",borderRadius:8,padding:"8px 16px",fontWeight:900,fontSize:20,letterSpacing:3,display:"inline-block",marginBottom:12}}>{classifyTarget.plate}</div>
            <input value={classifyCarType} onChange={e=>setClassifyCarType(e.target.value)}
              placeholder="🚗 차종 입력 (선택사항) — 예) 소나타, 아반떼, SUV"
              style={{width:"100%",padding:"10px 14px",border:"1.5px solid #e8e8e8",borderRadius:8,fontSize:13,fontFamily:"inherit",color:"#111",outline:"none",marginBottom:14}}
              onFocus={e=>e.target.style.borderColor="#111"}
              onBlur={e=>e.target.style.borderColor="#e8e8e8"}/>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
              {[
                {status:"불법주차",desc:"반복 출입하는 불법주차 차량"},
                {status:"방문객",  desc:"일시적인 방문객 차량"},
                {status:"교회성도",desc:"교회 성도 차량"},
                {status:"미확인",  desc:"나중에 다시 확인"},
              ].map(({status,desc})=>{
                const s=STATUS_INFO[status];
                return(
                  <button key={status} onClick={()=>classify(status)} style={{padding:"12px 14px",background:s.bg,border:`1.5px solid ${s.border}`,borderRadius:10,cursor:"pointer",fontFamily:"inherit",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:20}}>{s.icon}</span>
                    <div>
                      <div style={{color:s.color,fontWeight:700,fontSize:14}}>{s.label}</div>
                      <div style={{color:"#999",fontSize:11,marginTop:1}}>{desc}</div>
                    </div>
                  </button>
                );
              })}

              {/* 잘못입력 삭제 */}
              <button onClick={async()=>{
                if(!confirm(`${classifyTarget.plate} 기록을 삭제하시겠습니까?\n잘못 입력된 기록을 완전히 제거합니다.`))return;
                setSaving(true);
                try{
                  await sb.from("entry_log").delete().eq("plate",classifyTarget.plate);
                  await sb.from("unregistered_log").delete().eq("plate",classifyTarget.plate);
                  setLog(prev=>prev.filter(e=>e.plate!==classifyTarget.plate));
                  setUnreg(prev=>prev.filter(u=>u.plate!==classifyTarget.plate));
                  setFlash({type:"ok",msg:`🗑 ${classifyTarget.plate} 기록 삭제 완료`});
                  setClassifyTarget(null);
                }catch(e){setFlash({type:"err",msg:"삭제 실패: "+e.message});}
                setSaving(false);
              }} style={{padding:"12px 14px",background:"#f7f7f7",border:"1.5px solid #ddd",borderRadius:10,cursor:"pointer",fontFamily:"inherit",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>🗑</span>
                <div>
                  <div style={{color:"#666",fontWeight:700,fontSize:14}}>잘못 입력 삭제</div>
                  <div style={{color:"#bbb",fontSize:11,marginTop:1}}>이 차량의 모든 기록을 완전히 삭제합니다</div>
                </div>
              </button>
            </div>
            <div style={{background:"#f0fff4",border:"1px solid #9ae6b4",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12,color:"#276749"}}>
              💡 차량 등록은 <b>차량등록 버튼</b>에서만 가능합니다
            </div>
            <button onClick={()=>setClassifyTarget(null)} style={{width:"100%",padding:"11px",background:"#f5f5f5",border:"none",color:"#666",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>취소</button>
          </div>
        </div>
      )}

      {/* 차량등록 모달 */}
      {regOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:1500,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:64}} onClick={()=>setRegOpen(false)}>
          <div style={{background:"#fff",borderRadius:14,padding:20,width:"100%",maxWidth:480,margin:"0 16px",boxShadow:"0 20px 60px rgba(0,0,0,0.15)",animation:"slideIn 0.2s ease"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{fontSize:15,fontWeight:700,color:"#111"}}>📋 등록 차량 관리</div>
              <button onClick={()=>setRegOpen(false)} style={{background:"none",border:"none",fontSize:18,color:"#bbb",cursor:"pointer"}}>✕</button>
            </div>
            <div style={{background:"#fffff0",border:"1px solid #f6e05e",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#744210"}}>
              💡 빈칸 없이 입력 &nbsp;|&nbsp; 예) <b>서울12가3456</b> · <b>12가3456</b> · <b>서울12바3456</b>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input value={addPlate} onChange={e=>setAddPlate(e.target.value.replace(/\s/g,""))}
                onKeyDown={e=>e.key==="Enter"&&addReg()}
                placeholder="번호판 입력 (예: 서울12가3456)"
                style={{flex:1,padding:"11px 14px",border:"1.5px solid #e8e8e8",borderRadius:8,fontSize:15,fontFamily:"inherit",color:"#111",outline:"none"}}
                onFocus={e=>e.target.style.borderColor="#111"}
                onBlur={e=>e.target.style.borderColor="#e8e8e8"}/>
              <button onClick={addReg} style={{padding:"11px 16px",background:"#111",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ 등록</button>
            </div>
            <input value={addCarType} onChange={e=>setAddCarType(e.target.value)}
              placeholder="🚗 차종 입력 (선택사항) — 예) 소나타, 아반떼, SUV"
              style={{width:"100%",padding:"10px 14px",border:"1.5px solid #e8e8e8",borderRadius:8,fontSize:13,fontFamily:"inherit",color:"#111",outline:"none",marginBottom:14}}
              onFocus={e=>e.target.style.borderColor="#111"}
              onBlur={e=>e.target.style.borderColor="#e8e8e8"}/>
            {regList.length===0?(
              <div style={{textAlign:"center",color:"#ccc",padding:"16px 0",fontSize:13}}>등록된 차량이 없습니다</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:7,maxHeight:300,overflowY:"auto"}}>
                {regList.map((item,i)=>{
                  const p=item.plate;
                  return(
                    <CarTypeEditor key={i} item={item} onRemove={()=>removeReg(p)} onSave={(ct)=>updateCarType(p,ct)} plateBadge={plateBadge}/>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {/* 헤더 */}
      <div className="hdr">
        <div className="hdr-row">
          <div className="hdr-logo">P</div>
          <div className="hdr-title">
            <h1>서현빌딩 주차관리</h1>
            <p>PARKING CONTROL SYSTEM</p>
          </div>
          <div className="hdr-btns">
            <button className="btn-reg" onClick={()=>setRegOpen(true)}>
              📋 차량등록 <span className="cnt">{regList.length}</span>
            </button>
            {unconfirmed>0&&(
              <div className="btn-warn" onClick={()=>setTab("unreg")}>
                <div className="n">⚠️ {unconfirmed}건</div>
                <div className="l">미확인</div>
              </div>
            )}
          </div>
        </div>
        {flash&&(
          <div style={{marginTop:8,background:flash.type==="ok"?"#f0fff4":flash.type==="warn"?"#fffff0":"#fff5f5",border:`1px solid ${flash.type==="ok"?"#9ae6b4":flash.type==="warn"?"#f6e05e":"#fc8181"}`,color:flash.type==="ok"?"#276749":flash.type==="warn"?"#744210":"#c53030",padding:"7px 12px",borderRadius:8,fontSize:12}}>
            {flash.msg}
          </div>
        )}
      </div>

      {/* 탭 */}
      <div style={{display:"flex",gap:8,padding:"12px 14px",background:"#f5f5f5",borderBottom:"1px solid #e8e8e8"}}>
        {[
          {id:"check",label:"🔍 주차조회",ac:"#2b6cb0",ab:"#ebf8ff",ib:"#bee3f8"},
          {id:"log",  label:"📊 주차기록",ac:"#276749",ab:"#f0fff4",ib:"#9ae6b4"},
          {id:"unreg",label:"⚠️ 조치필요차량",ac:"#c53030",ab:"#fff5f5",ib:"#fed7d7"},
        ].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:"10px 6px",
            background:tab===t.id?t.ab:"#fff",
            color:tab===t.id?t.ac:"#888",
            border:`1.5px solid ${tab===t.id?t.ac:t.ib}`,
            borderRadius:50,cursor:"pointer",fontSize:13,fontFamily:"inherit",
            fontWeight:tab===t.id?800:600,whiteSpace:"nowrap",textAlign:"center",
            transition:"all 0.2s",
            boxShadow:tab===t.id?`0 2px 8px ${t.ac}33`:"none",
          }}>{t.label}</button>
        ))}
      </div>

      <div style={{padding:"16px",maxWidth:720,margin:"0 auto"}}>

        {/* 주차조회 */}
        {tab==="check"&&(
          <div>
            {/* 이용 안내 카드 */}
            <div style={{background:"#fff",borderRadius:12,border:"1px solid #e8e8e8",padding:"14px 16px",marginBottom:14,borderLeft:"4px solid #2b6cb0"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#2b6cb0",marginBottom:8}}>📌 이용 안내</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {[
                  {n:"1",text:"지정 차량은 미리 차량등록을 해 주세요"},
                  {n:"2",text:"가끔 한번씩 편하신 시간에 주차조회를 해 주세요"},
                  {n:"3",text:"주차기록이 쌓이면 조치필요차량으로 자동 분류됩니다"},
                ].map(({n,text})=>(
                  <div key={n} style={{display:"flex",alignItems:"flex-start",gap:8}}>
                    <div style={{flex:"0 0 20px",width:20,height:20,background:"#2b6cb0",color:"#fff",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,marginTop:1}}>{n}</div>
                    <div style={{fontSize:13,color:"#444",lineHeight:1.5}}>{text}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:"#fff",borderRadius:16,padding:"20px 18px",marginBottom:12,border:"2px solid #e8e8e8",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                <div style={{background:"#003580",color:"#fff",borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:800,letterSpacing:1}}>🇰🇷 KOR</div>
                <div style={{fontSize:13,color:"#555",fontWeight:600}}>차량 번호판 입력</div>
                <div style={{marginLeft:"auto",fontSize:11,color:"#bbb"}}>신형·구형·영업용 모두 지원</div>
              </div>

              {/* 입력창 + 드롭다운 */}
              <div style={{position:"relative"}}>
                <div style={{background:plateReady?"#f5c518":"#f9f9f9",border:`2px solid ${plateReady?"#e6b800":"#ddd"}`,borderRadius:10,padding:"4px 8px",transition:"all 0.25s",boxShadow:plateReady?"0 2px 12px rgba(245,197,24,0.4)":"inset 0 1px 4px rgba(0,0,0,0.06)"}}>
                  <input ref={inputRef} value={plateInput}
                    onChange={e=>setPlateInput(e.target.value.replace(/\s/g,""))}
                    onKeyDown={e=>e.key==="Enter"&&isValid(plateInput)&&doCheck()}
                    placeholder="12가3456" maxLength={10}
                    style={{width:"100%",padding:"16px 12px",border:"none",borderRadius:8,fontSize:36,fontWeight:900,letterSpacing:8,fontFamily:"inherit",color:plateReady?"#111":"#333",outline:"none",textAlign:"center",background:"transparent"}}/>
                </div>

                {/* 자동완성 드롭다운 */}
                {(()=>{
                  if(plateInput.length<2)return null;
                  const q=clean(plateInput).toLowerCase();
                  // 등록차량 + 기존 기록에서 검색
                  const allPlates=[...new Set([...regList.map(r=>r.plate),...log.map(l=>l.plate)])];
                  const matched=allPlates.filter(p=>p.toLowerCase().includes(q));
                  const exactMatch=allPlates.some(p=>p===clean(plateInput));

                  if(exactMatch)return null; // 정확히 일치하면 드롭다운 불필요

                  return(
                    <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:"#fff",border:"1px solid #e8e8e8",borderRadius:12,boxShadow:"0 8px 30px rgba(0,0,0,0.12)",zIndex:100,overflow:"hidden",animation:"slideIn 0.15s ease"}}>
                      {matched.length>0?(
                        <>
                          <div style={{padding:"8px 14px",fontSize:11,color:"#999",borderBottom:"1px solid #f0f0f0",fontWeight:600}}>
                            🔍 기존 차량 중 일치하는 번호판
                          </div>
                          {matched.slice(0,6).map((plate,i)=>{
                            const isReg=regList.some(r=>r.plate===plate);
                            const uInfo=unreg.find(u=>u.plate===plate);
                            return(
                              <div key={i} onClick={()=>{setPlateInput(plate);}}
                                style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",cursor:"pointer",borderBottom:i<Math.min(matched.length,6)-1?"1px solid #f9f9f9":"none",transition:"background 0.1s"}}
                                onMouseEnter={e=>e.currentTarget.style.background="#f9f9f9"}
                                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                                <div style={{fontSize:18}}>{isReg?"✅":"🔴"}</div>
                                <div style={{flex:1}}>
                                  <div style={{fontWeight:800,fontSize:15,letterSpacing:2,color:"#111"}}>{plate}</div>
                                  <div style={{fontSize:11,color:isReg?"#38a169":"#e53e3e",marginTop:1}}>
                                    {isReg?"등록 차량":uInfo?`미등록 · ${uInfo.count}회 감지`:"미등록"}
                                  </div>
                                </div>
                                <div style={{fontSize:12,color:"#bbb"}}>선택 →</div>
                              </div>
                            );
                          })}
                          {matched.length>6&&<div style={{padding:"8px 14px",fontSize:11,color:"#bbb",textAlign:"center"}}>{matched.length-6}개 더 있음</div>}
                        </>
                      ):(
                        <div style={{padding:"16px 14px",textAlign:"center"}}>
                          <div style={{fontSize:20,marginBottom:6}}>🔎</div>
                          <div style={{fontSize:13,color:"#888",fontWeight:600}}>일치하는 기존 차량 없음</div>
                          <div style={{fontSize:12,color:"#bbb",marginTop:4}}>전체 번호판을 입력하고 조회해 주세요</div>
                          <div style={{fontSize:11,color:"#bbb",marginTop:2}}>예) <b style={{color:"#555"}}>147부8557</b> · <b style={{color:"#555"}}>서울12가3456</b></div>
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>

              <div style={{display:"flex",gap:6,marginTop:12,justifyContent:"center",flexWrap:"wrap"}}>
                <div style={{fontSize:11,color:"#bbb",alignSelf:"center"}}>예시:</div>
                {["12가3456","서울12가3456","서울12바3456"].map(ex=>(
                  <button key={ex} onClick={()=>setPlateInput(ex)} style={{background:"#f5f5f5",border:"1px solid #e8e8e8",color:"#555",borderRadius:20,padding:"4px 12px",fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>{ex}</button>
                ))}
              </div>
            </div>
            <button onClick={doCheck} disabled={!plateReady||saving} style={{
              width:"100%",padding:"14px",
              background:plateReady?"#111":"#e8e8e8",
              color:plateReady?"#fff":"#bbb",
              border:"none",borderRadius:10,fontSize:17,fontWeight:800,
              cursor:plateReady?"pointer":"not-allowed",fontFamily:"inherit",letterSpacing:1,
              animation:plateReady?"pulse 1.5s ease-in-out infinite":"none",
              transition:"all 0.2s",display:"flex",alignItems:"center",justifyContent:"center",gap:10,
            }}>
              <span style={{fontSize:22}}>⌨️</span>
              {plateReady?"조회 / 기록 — 눌러주세요!":"번호판을 입력하세요"}
            </button>
            {plateReady&&<div style={{textAlign:"center",marginTop:6,fontSize:12,color:"#666"}}>⬆ 입력 완료! 버튼을 누르거나 Enter 키를 눌러주세요</div>}

            {result&&(
              <div ref={resultRef} style={{marginTop:16,borderRadius:12,overflow:"hidden",border:`2px solid ${result.isRegistered?"#9ae6b4":"#fc8181"}`,animation:"slideIn 0.3s ease"}}>
                <div style={{background:result.isRegistered?"#f0fff4":"#fff5f5",padding:"18px 16px",display:"flex",alignItems:"center",gap:14}}>
                  <div style={{fontSize:36}}>{result.isRegistered?"✅":"🔴"}</div>
                  <div>
                    <div style={{fontSize:22,fontWeight:900,letterSpacing:3,color:"#111"}}>{result.plate}</div>
                    <div style={{fontSize:16,fontWeight:700,color:result.isRegistered?"#276749":"#e53e3e",marginTop:2}}>{result.isRegistered?"✔ 등록된 차량":"✖ 미등록 차량"}</div>
                  </div>
                  {!result.isRegistered&&unregCount(result.plate)>0&&(
                    <div style={{marginLeft:"auto",background:"#e53e3e",color:"#fff",borderRadius:20,padding:"5px 14px",fontSize:13,fontWeight:700}}>누적 {unregCount(result.plate)}회</div>
                  )}
                </div>
                <div style={{background:"#fff",padding:"10px 16px",fontSize:13,color:"#999",display:"flex",gap:16,alignItems:"center"}}>
                  <span>⏰ {result.time}</span>
                  {!result.isRegistered&&(
                    <button onClick={()=>setClassifyTarget({plate:result.plate})} style={{marginLeft:"auto",background:"#fff",border:"1px solid #111",color:"#111",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:700}}>분류하기 →</button>
                  )}
                </div>
              </div>
            )}
          </div>
        )}

        {/* 주차기록 */}
        {tab==="log"&&(
          <div>
            <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              {["전체","오늘","이번주","이번달"].map(f=>(
                <button key={f} onClick={()=>setLogFilter(f)} style={{padding:"6px 14px",background:logFilter===f?"#111":"#fff",color:logFilter===f?"#fff":"#666",border:`1px solid ${logFilter===f?"#111":"#e8e8e8"}`,borderRadius:20,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:logFilter===f?700:400}}>{f}</button>
              ))}
              <div style={{marginLeft:"auto",fontSize:12,color:"#999"}}>{filteredLog.length}건</div>
              <button onClick={clearOld} style={{background:"none",border:"1px solid #fed7d7",color:"#e53e3e",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>🗑 3개월 이전 삭제</button>
            </div>
            {filteredLog.length===0?(
              <div style={{textAlign:"center",color:"#bbb",padding:40,fontSize:14}}>기록이 없습니다</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {filteredLog.map((entry,i)=>{
                  const s=entry.status?STATUS_INFO[entry.status]:null;
                  const wasLater=!entry.registered&&regList.some(r=>r.plate===entry.plate);
                  return(
                    <div key={entry.id||i} style={{...card(),borderLeft:`4px solid ${entry.registered?"#38a169":s?s.border:"#fc8181"}`}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{fontSize:20}}>{entry.registered?"✅":s?s.icon:"🔴"}</div>
                        <div style={{flex:1}}>
                          <div style={plateBadge}>{entry.plate}</div>
                          {entry.car_type&&<div style={{fontSize:11,color:"#888",marginTop:3}}>🚗 {entry.car_type}</div>}
                          <div style={{marginTop:5,fontSize:12,color:"#999"}}>⏰ {entry.time_str}</div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:entry.registered?"#38a169":s?s.color:"#e53e3e"}}>{entry.registered?"등록 차량":s?s.label:"미확인"}</div>
                          {wasLater&&<div style={{fontSize:11,color:"#b7791f",marginTop:2}}>🕐 등록 전 기록</div>}
                          {!entry.registered&&!wasLater&&(
                            <button onClick={()=>setClassifyTarget({plate:entry.plate,currentStatus:entry.status})} style={{marginTop:4,background:"#fff",border:"1px solid #e8e8e8",color:"#666",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>분류하기</button>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* 미등록차량 */}
        {tab==="unreg"&&(
          <div>
            <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
              {["전체","미확인","불법주차","방문객","교회성도"].map(f=>{
                const s=f!=="전체"?STATUS_INFO[f]:null;
                const active=unregFilter===f;
                return(
                  <button key={f} onClick={()=>setUnregFilter(f)} style={{padding:"5px 12px",background:active?(s?s.bg:"#111"):"#fff",color:active?(s?s.color:"#fff"):"#666",border:`1px solid ${active?(s?s.border:"#111"):"#e8e8e8"}`,borderRadius:20,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:active?700:400}}>
                    {s?`${s.icon} ${s.label}`:"전체"}
                  </button>
                );
              })}
            </div>
            {filteredUnreg.length===0?(
              <div style={{textAlign:"center",color:"#bbb",padding:40}}><div style={{fontSize:32,marginBottom:8}}>✅</div>해당 차량 없음</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {filteredUnreg.map((u,i)=>{
                  const s=STATUS_INFO[u.status||"미확인"];
                  const dayNames=["일","월","화","수","목","금","토"];
                  const dc={};
                  (u.times||[]).forEach(t=>{const dd=new Date(t);if(!isNaN(dd)){const day=dayNames[dd.getDay()];dc[day]=(dc[day]||0)+1;}});
                  const topDays=Object.entries(dc).sort((a,b)=>b[1]-a[1]).slice(0,3);
                  return(
                    <div key={i} style={{...card(),border:`1.5px solid ${s.border}`}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                        <div>
                          <div style={plateBadge}>{u.plate}</div>
                          <div style={{marginTop:6,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                            {u.car_type&&<div style={{fontSize:12,color:"#555",fontWeight:600}}>🚗 {u.car_type}</div>}
                            <div style={{background:u.count>=5?"#e53e3e":u.count>=3?"#dd6b20":"#975a16",color:"#fff",borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>
                              {u.count>=5?"🚨":u.count>=3?"⚠️":"📌"} {u.count}회 감지
                            </div>
                            <div style={{background:s.bg,border:`1px solid ${s.border}`,borderRadius:20,padding:"2px 10px",fontSize:12,color:s.color,fontWeight:600}}>{s.icon} {s.label}</div>
                            {u.status==="미확인"&&<div style={{background:"#fff8f0",border:"1px solid #fbd38d",borderRadius:20,padding:"2px 10px",fontSize:12,color:"#c05621",fontWeight:700}}>⚡ 조치 필요</div>}
                          </div>
                        </div>
                        <button onClick={()=>setClassifyTarget({plate:u.plate,currentStatus:u.status})} style={{marginLeft:"auto",background:"#555",border:"none",color:"#fff",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:700,flexShrink:0}}>분류 변경</button>
                      </div>
                      {topDays.length>0&&(
                        <div style={{background:"#f9f9f9",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
                          <div style={{fontSize:11,color:"#999",marginBottom:5}}>📅 출입 패턴</div>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                            {["월","화","수","목","금","토","일"].map(day=>{
                              const cnt=dc[day]||0;
                              return(
                                <div key={day} style={{textAlign:"center",minWidth:32}}>
                                  <div style={{fontSize:11,color:"#bbb",marginBottom:2}}>{day}</div>
                                  <div style={{width:32,height:32,borderRadius:6,background:cnt>=3?"#e53e3e":cnt>=2?"#dd6b20":cnt>=1?"#f6e05e":"#f0f0f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:cnt>=1?"#111":"#ccc"}}>{cnt||""}</div>
                                </div>
                              );
                            })}
                          </div>
                          {topDays.length>0&&<div style={{fontSize:11,color:"#888",marginTop:6}}>주로 <b style={{color:"#c53030"}}>{topDays.map(([d])=>d+"요일").join(", ")}</b>에 출입</div>}
                        </div>
                      )}
                      <div style={{borderTop:"1px solid #f0f0f0",paddingTop:10}}>
                        <div style={{fontSize:12,color:"#999",marginBottom:6}}>감지 시각</div>
                        {(u.times||[]).map((t,j)=>(
                          <div key={j} style={{fontSize:13,color:j===0?"#111":"#bbb",display:"flex",gap:8,marginBottom:4,fontWeight:j===0?700:400,alignItems:"center"}}>
                            <span style={{color:j===0?"#111":"#ddd"}}>{j===0?"▶":"·"}</span>
                            <span>{t}</span>
                            {j===0&&<span style={{fontSize:10,background:"#f5f5f5",border:"1px solid #e8e8e8",borderRadius:4,padding:"1px 6px",color:"#999"}}>최근</span>}
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
